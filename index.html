<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تهنئة العيد</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Tajawal',sans-serif;
background-image: url('bg.png');
background-size: cover;        
background-position: center;  
background-repeat: no-repeat;  
min-height: 100vh;  
text-align:center;
direction:rtl;
margin:0;
padding:20px;
}

h2{
margin-bottom:0px;
}

input{
padding:10px;
font-size:18px;
width:220px;
margin:15px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
background:#222;
color:white;
border-radius:600px;
}

canvas{
max-width:75%;
margin-top:15px;
box-shadow:0 12px 16px rgba(0,0,0,70);
}

</style>
</head>

<body>

<h2>تهنئة العيد</h2>

<input id="nameInput" style="text-align: center;" placeholder="اكتب اسمك">

<br>

<button onclick="downloadImage()">حفظ الصورة</button>

<br>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const img = new Image();
img.src = "eid.png";

img.onload = () => {

canvas.width = img.width;
canvas.height = img.height;

draw("");

};

document.getElementById("nameInput").addEventListener("input",function(){
draw(this.value);
});

function draw(name){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0);

ctx.fillStyle="black";
ctx.textAlign="center";
ctx.font="60px Tajawal";

ctx.fillText(name,canvas.width/1.65,1255);

}

function downloadImage(){

const link=document.createElement("a");
link.download="eid.png";
link.href=canvas.toDataURL();
link.click();

}

</script>

</body>
</html>
